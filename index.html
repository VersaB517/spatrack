<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SPAtrack</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Syne:wght@700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#07090f;color:#dde3f0;font-family:'DM Sans',sans-serif;font-size:14px;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:#0d1117;} ::-webkit-scrollbar-thumb{background:#1e2d42;border-radius:2px;}
#app{display:flex;flex-direction:column;min-height:100vh;}

/* NAV */
#topnav{display:flex;align-items:center;gap:16px;padding:0 24px;height:58px;border-bottom:1px solid #1e2d42;background:#07090f;flex-shrink:0;position:sticky;top:0;z-index:100;}
.logo{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#4f8ef7;letter-spacing:-.02em;cursor:default;}
.logo span{color:#2a3a52;}
.nav-divider{width:1px;height:20px;background:#131b28;}
.navitem{padding:7px 16px;border-radius:6px;cursor:pointer;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:#64748b;transition:all .15s;font-family:'DM Sans',sans-serif;font-weight:600;border:1px solid transparent;}
.navitem:hover{background:rgba(79,142,247,.1);color:#8ba9d4;border-color:#1e2d42;}
.navitem.active{color:#4f8ef7;background:rgba(79,142,247,.15);border-color:rgba(79,142,247,.4);}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.alert-pill{background:#2d0a0a;border:1px solid #5c1a1a;border-radius:20px;padding:3px 10px;font-size:10px;color:#f87171;letter-spacing:.06em;animation:pu 2s ease-in-out infinite;}
@keyframes pu{0%,100%{opacity:1;}50%{opacity:.4;}}

/* ACCOUNT BAR */
#accountbar{display:flex;align-items:center;gap:12px;padding:10px 24px;border-bottom:1px solid #1e2d42;background:#0a0f1c;flex-shrink:0;}
.eu-label{font-size:13px;color:#94a3b8;letter-spacing:.06em;text-transform:uppercase;font-weight:700;white-space:nowrap;}
.eu-select-wrap{position:relative;flex:0 0 auto;}
.eu-select{appearance:none;-webkit-appearance:none;background:#0d1520;color:#e2e8f0;border:2px solid #2a3a52;border-radius:8px;padding:9px 36px 9px 14px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;outline:none;min-width:200px;transition:border-color .15s;}
.eu-select:focus{border-color:#4f8ef7;} .eu-select:hover{border-color:#4f8ef7;}
.eu-select-arrow{position:absolute;right:11px;top:50%;transform:translateY(-50%);pointer-events:none;color:#4a5568;font-size:11px;}
.eu-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle;}
.eu-add-btn{background:#131b28;border:1px solid #2a3a52;border-radius:8px;padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:#94a3b8;cursor:pointer;transition:all .15s;white-space:nowrap;}
.eu-add-btn:hover{color:#e2e8f0;border-color:#4f8ef7;background:#1a2540;}
.eu-actions{display:flex;gap:6px;margin-left:auto;}
.eu-action-btn{background:#131b28;border:1px solid #2a3a52;border-radius:6px;padding:7px 14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:#94a3b8;cursor:pointer;transition:all .15s;}
.eu-action-btn:hover{color:#e2e8f0;border-color:#4f8ef7;background:#1a2540;}
.eu-action-btn.danger:hover{color:#f87171;border-color:#f87171;background:#1a0505;}

/* SEARCH BAR */
#searchbar{padding:10px 24px;border-bottom:1px solid #1e2d42;background:#07090f;flex-shrink:0;}
.search-wrap{display:flex;align-items:center;gap:10px;background:#0d1520;border:2px solid #1e2d42;border-radius:8px;padding:9px 14px;transition:border-color .15s;}
.search-wrap:focus-within{border-color:#4f8ef7;}
.search-wrap svg{color:#2a3a52;flex-shrink:0;}
.search-inp{background:transparent;border:none;outline:none;color:#dde3f0;font-family:'DM Sans',sans-serif;font-size:14px;flex:1;}
.search-inp::placeholder{color:#64748b;font-size:13px;}
.search-clear{background:transparent;border:none;color:#4a5568;cursor:pointer;font-size:14px;padding:0 2px;}
.search-clear:hover{color:#8ba9d4;}

/* MAIN */
#main{flex:1;overflow:auto;padding:20px 24px;}

/* CARDS */
.card{background:#0d1117;border:1px solid #131b28;border-radius:8px;}
.subcard{background:#09111a;border:1px solid #131b28;border-radius:6px;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.stat-card{background:#0d1520;border:1px solid #1e2d42;border-radius:8px;padding:16px 20px;}
.stat-label{font-size:11px;color:#94a3b8;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;font-weight:600;}
.stat-val{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;}

/* BUTTONS */
.btn{border:none;border-radius:5px;padding:6px 13px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;letter-spacing:.05em;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.btn:hover:not(:disabled){filter:brightness(1.2);}
.btn:disabled{opacity:.35;cursor:not-allowed;filter:none;}
.btn-primary{background:#1d4ed8;color:#fff;}
.btn-ghost{background:transparent;color:#4a5568;border:1px solid #1e2d42;}
.btn-ghost:hover{color:#8ba9d4;}
.btn-muted{background:#131b28;color:#64748b;}
.btn-ai{background:linear-gradient(135deg,#5b21b6,#1d4ed8);color:#fff;}
.btn-danger{background:transparent;color:#ef4444;border:1px solid #2d0a0a;}
.btn-sm{padding:3px 8px;font-size:10px;}

/* INPUTS */
.inp{background:#09111a;color:#dde3f0;border:1px solid #1e2d42;border-radius:5px;padding:8px 12px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;outline:none;width:100%;}
.inp:focus{border-color:#4f8ef7;}
.inp.ai-filled{border-color:#5b21b6;background:rgba(91,33,182,.08);}

/* TABLE */
.tbl-wrap{border:1px solid #131b28;border-radius:8px;overflow:hidden;}
.tbl-hdr{background:#0a1020;padding:10px 14px;display:grid;font-size:12px;color:#cbd5e1;letter-spacing:.05em;text-transform:uppercase;font-weight:700;}
.tbl-row{padding:10px 14px;display:grid;border-top:1px solid #0d1520;align-items:center;cursor:pointer;transition:background .1s;}
.tbl-row:nth-child(odd){background:#0d1117;}
.tbl-row:nth-child(even){background:#09111a;}
.tbl-row:hover{background:rgba(79,142,247,.06);}
.tbl-row.sel{background:rgba(79,142,247,.09);}
.tbl-foot{background:#09111a;padding:10px 14px;display:grid;border-top:2px solid #1e2d42;align-items:center;}

/* BADGES */
.badge{border-radius:3px;padding:2px 6px;font-size:9px;border:1px solid;display:inline-block;letter-spacing:.05em;}
.pill{border-radius:20px;padding:2px 8px;font-size:9px;border:1px solid;display:inline-block;}
.dot{display:inline-block;border-radius:50%;vertical-align:middle;flex-shrink:0;}

/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:500;}
.modal-box{background:#0d1117;border:1px solid #1e2d42;border-radius:10px;padding:24px;width:540px;max-height:90vh;overflow-y:auto;}
.modal-box.lg{width:660px;}
.modal-box.sm{width:360px;}

/* GRID HELPERS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 58px;gap:6px;}
.flex{display:flex;} .flex-col{display:flex;flex-direction:column;}
.gap4{gap:4px;}.gap6{gap:6px;}.gap8{gap:8px;}.gap10{gap:10px;}.gap12{gap:12px;}
.mb4{margin-bottom:4px;}.mb6{margin-bottom:6px;}.mb8{margin-bottom:8px;}.mb10{margin-bottom:10px;}.mb12{margin-bottom:12px;}.mb14{margin-bottom:14px;}.mb16{margin-bottom:16px;}.mb18{margin-bottom:18px;}
.mt4{margin-top:4px;}.mt8{margin-top:8px;}.mt12{margin-top:12px;}
.w100{width:100%;} .f11{font-size:11px;} .f12{font-size:12px;}
.overflow-hidden{overflow:hidden;} .sticky-top{position:sticky;top:0;}
.text-muted{color:#64748b;}
.syne{font-family:'Syne',sans-serif;}

/* IMPORT ZONE */
.drop-zone{border:2px dashed #1e2d42;border-radius:8px;padding:28px;text-align:center;transition:all .2s;cursor:pointer;}
.drop-zone:hover,.drop-zone.over{border-color:#5b21b6;background:rgba(91,33,182,.06);}

/* SPINNER */
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:#4f8ef7;border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:#0d1117;border:1px solid #1e2d42;border-radius:7px;padding:10px 16px;font-size:12px;z-index:999;animation:fi .2s ease;box-shadow:0 8px 32px rgba(0,0,0,.6);}
.toast.ok{border-color:#16532444;color:#4ade80;}
.toast.err{border-color:#5c1a1a;color:#f87171;}

/* SEARCH RESULTS */
.search-result-tag{background:#131b28;border:1px solid #1e2d42;border-radius:4px;padding:2px 7px;font-size:10px;color:#8ba9d4;display:inline-block;margin:2px;}
.search-hit{border-left:3px solid;border-radius:8px;padding:16px 20px;margin-bottom:12px;}
.vtab{display:inline-block;padding:7px 16px;border-radius:20px;cursor:pointer;font-size:13px;border:1px solid #2a3a52;white-space:nowrap;color:#94a3b8;transition:all .15s;font-weight:600;background:#0d1520;margin:0 5px 8px 0;}
.vtab:hover{color:#e2e8f0;border-color:#4f8ef7;background:#131f35;}
.vtab.vactive{background:rgba(79,142,247,.18);color:#e2e8f0;border-color:#4f8ef7;font-weight:700;box-shadow:0 0 0 1px rgba(79,142,247,.3);}
#vendortabs{display:flex;flex-wrap:wrap;padding-bottom:12px;}
.view-toggle{display:flex;gap:0;border:1px solid #1e2d42;border-radius:6px;overflow:hidden;}
.view-toggle-btn{padding:5px 10px;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;border:none;background:#09111a;color:#4a5568;transition:all .15s;}
.view-toggle-btn:hover{color:#94a3b8;}
.view-toggle-btn.active{background:#1d4ed8;color:#fff;}
.tbl-hdr{position:sticky;top:0;z-index:10;}
.tbl-row.compact{padding:5px 14px;}
.tip{position:relative;}
.tip:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1e2d42;color:#e2e8f0;font-size:11px;font-weight:500;padding:4px 8px;border-radius:5px;white-space:nowrap;pointer-events:none;z-index:999;border:1px solid #2a3a52;}
.tip:hover::before{content:"";position:absolute;bottom:calc(100% + 1px);left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1e2d42;pointer-events:none;z-index:999;}
.action-cell{display:flex;flex-direction:column;gap:5px;align-items:flex-end;}

/* ANIMATIONS */
.fadein{animation:fi .2s ease;}
@keyframes fi{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

/* FILE TYPE ICONS */
.file-icon{font-size:28px;margin-bottom:8px;}
/* PDF VIEWER */
.delta-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:600;padding:20px;}
.delta-box{background:#0d1117;border:1px solid #1e2d42;border-radius:12px;width:100%;max-width:800px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;}
.delta-hdr{padding:16px 20px;border-bottom:1px solid #131b28;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.delta-body{overflow-y:auto;padding:16px 20px;flex:1;}
.delta-row{display:grid;grid-template-columns:110px 1fr 90px 90px 80px 70px;gap:8px;padding:8px 10px;border-radius:5px;font-size:12px;align-items:center;margin-bottom:3px;}
.delta-hdr-row{display:grid;grid-template-columns:110px 1fr 90px 90px 80px 70px;gap:8px;padding:6px 10px;font-size:10px;font-weight:700;color:#64748b;letter-spacing:.06em;text-transform:uppercase;}
.hist-card{background:#0d1117;border:1px solid #1e2d42;border-radius:8px;margin-bottom:10px;overflow:hidden;}
.hist-card-hdr{padding:12px 16px;display:grid;grid-template-columns:1fr 120px 100px 90px 80px;gap:8px;align-items:center;cursor:pointer;transition:background .15s;}
.hist-card-hdr:hover{background:#131b28;}
.hist-card-body{padding:0 16px 14px;display:none;}
.hist-card-body.open{display:block;}
.hist-delta-row{display:grid;grid-template-columns:110px 1fr 90px 90px 80px 70px;gap:8px;padding:6px 8px;border-radius:4px;font-size:11px;align-items:center;margin-bottom:2px;}
.hist-delta-hdr{display:grid;grid-template-columns:110px 1fr 90px 90px 80px 70px;gap:8px;padding:5px 8px;font-size:10px;font-weight:700;color:#4a5568;letter-spacing:.05em;text-transform:uppercase;border-bottom:1px solid #131b28;margin-bottom:6px;}
.eu-group-hdr{font-family:"Syne",sans-serif;font-size:16px;font-weight:700;color:#f1f5f9;padding:8px 0 8px 0;margin-top:18px;border-bottom:1px solid #1e2d42;margin-bottom:10px;}
.eu-group-hdr:first-child{margin-top:0;}
.pdf-viewer-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;z-index:600;padding:20px;}
.pdf-viewer-header{display:flex;align-items:center;gap:12px;width:100%;max-width:900px;margin-bottom:12px;}
.pdf-viewer-frame{width:100%;max-width:900px;flex:1;border-radius:8px;border:1px solid #1e2d42;background:#fff;}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════
const EXPIRING_DAYS = 14;
const EU_COLORS = ["#4f8ef7","#a78bfa","#f472b6","#2dd4bf","#fb923c","#a3e635","#facc15","#38bdf8"];
const APIKEY_KEY = "spatrackApiKey2";

// ═══════════════════════════════════════════
//  DATA LAYER  (swap apiGet/Post/Put/Del for Option 3)
// ═══════════════════════════════════════════
async function apiGet(p)      { const r=await fetch(p); if(!r.ok)throw new Error(await r.text()); return r.json(); }
async function apiPost(p,b)   { const r=await fetch(p,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(b)}); if(!r.ok)throw new Error(await r.text()); return r.json(); }
async function apiPut(p,b)    { const r=await fetch(p,{method:"PUT", headers:{"Content-Type":"application/json"},body:JSON.stringify(b)}); if(!r.ok)throw new Error(await r.text()); return r.json(); }
async function apiDel(p)      { const r=await fetch(p,{method:"DELETE"}); if(!r.ok)throw new Error(await r.text()); return r.json(); }

async function loadAll() {
  const [raw, margins] = await Promise.all([apiGet("/api/spas"), apiGet("/api/margins")]);
  const spas = raw.map(r=>({id:r.id,vendor:normalizeVendor(r.vendor),endUser:r.end_user,spaNumber:r.spa_number,discount:r.discount,expiration:r.expiration,category:r.category,items:r.items||[],docUrl:r.doc_url||"",renewalRequested:r.renewal_requested||false,status:calcStatus(r.expiration,r.renewal_status),renewalStatus:r.renewal_status||""}));
  return {spas,margins};
}

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
function daysUntil(d) { const exp=new Date(d); exp.setHours(0,0,0,0); return Math.round((exp-TODAY)/86400000); }
function calcStatus(d,cur) { if(cur==="renewal"||cur==="submitted") return cur; const n=daysUntil(d); if(n<0)return "expired"; if(n===0)return "today"; if(n<=EXPIRING_DAYS)return "expiring"; return "active"; }
function fmtDate(d)      { return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}); }
function normalizeVendor(v) {
  if(!v) return v;
  const lower=v.toLowerCase();
  if(lower.includes("corning")) return "Corning";
  if(lower.includes("commscope")||lower.includes("comm scope")) return "CommScope";
  if(lower.includes("legrand")) return "Legrand";
  if(lower.includes("superior essex")) return "Superior Essex";
  if(lower.includes("schneider")) return "Schneider Electric";
  if(lower.includes("chatsworth")) return "Chatsworth Products";
  return v;
}
function fmtMoney(v)     { return "$"+Number(v||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtSPA(v)       {
  // Show up to 5 decimal places — removes trailing zeros but keeps at least 2
  const n=Number(v||0);
  const s=n.toFixed(5);
  // Remove trailing zeros after decimal but keep at least 2 places
  const trimmed=s.replace(/(\.[0-9]*[1-9])0+$|(\.00)$/, (m,p1,p2)=>p1||p2||".00");
  return "$"+trimmed;
}
function euCol(n,a)      { const e=a.find(x=>x.name===n); return e?e.color:"#4a5568"; }
function buildEUs(spas,margins) {
  const names=[...new Set([...spas.map(s=>s.endUser),...Object.keys(margins)])];
  const sorted=[...names].sort((a,b)=>a.localeCompare(b));
  return sorted.map((name,i)=>({name,color:EU_COLORS[i%EU_COLORS.length]}));
}
function blankSPA()  { return {vendor:"",endUser:"",spaNumber:"",discount:"",expiration:"",category:"",items:[],docUrl:"",_ni:blankItem()}; }
function blankItem() { return {partNumber:"",description:"",listPrice:"",qty:"",uom:"EA"}; }
function loadKey()   { try{return window.__ANTHROPIC_KEY||localStorage.getItem(APIKEY_KEY)||""; }catch(e){return "";} }
function saveKey(k)  { try{localStorage.setItem(APIKEY_KEY,k);}catch(e){} }

const ST = {
  active:   {color:"#4ade80",bg:"#052010",label:"Active"},
  expiring: {color:"#fbbf24",bg:"#1c1200",label:"Expiring Soon"},
  today:    {color:"#fb923c",bg:"#1f0d00",label:"Expires Today"},
  expired:  {color:"#f87171",bg:"#1a0505",label:"Expired"},
  renewal:  {color:"#818cf8",bg:"#0f0a2a",label:"Renewal In Progress"},
  submitted:{color:"#22d3ee",bg:"#061a1f",label:"Renewal Submitted"},
};

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let S = {
  spas:[], margins:{}, loading:true, loadErr:"",
  view:"dashboard", activeEU:"all", selSPA:null,
  filterSt:"all", sortBy:"expiration",
  searchQ:"",
  showAdd:false, showEdit:false, showAddEU:false, showEditEU:false, showDeleteEU:false, showClear:false, showApiKey:false, showImport:false,
  activeVendor:'all',
  compactView:false,
  showDeleteConfirm:false, _deletingId:null, _deletingName:'',
  newEU:"", editEUName:"", editEUOld:"", deleteEUName:"", editSPA:null, newSPA:blankSPA(),
  apiKey:loadKey(),
  imp:{step:"upload",file:null,b64:null,name:"",fileType:"",busy:false,err:"",review:null},
  toast:null,
};

function set(patch,re=true){ Object.assign(S,patch); if(re)render(); }
function toast(msg,type="ok",ms=3000){ S.toast={msg,type};render();setTimeout(()=>{S.toast=null;render();},ms); }

// ═══════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════
async function doAddSPA(spa) {
  try {
    const row=await apiPost("/api/spas",{vendor:normalizeVendor(spa.vendor)||spa.vendor,end_user:spa.endUser,spa_number:spa.spaNumber,discount:parseFloat(spa.discount)||0,expiration:spa.expiration,category:spa.category,items:spa.items,doc_url:spa.docUrl||null,renewal_status:null,renewal_requested:false});
    const ns={id:row.id,vendor:normalizeVendor(row.vendor)||row.vendor,endUser:row.end_user,spaNumber:row.spa_number,discount:row.discount,expiration:row.expiration,category:row.category,items:row.items||[],docUrl:row.doc_url||"",renewalRequested:false,renewalStatus:"",status:calcStatus(row.expiration,null)};
    // If replacing an expired SPA, delete old one and compute delta
    if(S._replacingSPA){
      const oldSPA=S._replacingSPA;
      const oldId=oldSPA.id;
      // Compute price delta before deleting
      const deltaItems=[];
      ns.items.forEach(newItem=>{
        const oldItem=oldSPA.items.find(o=>o.partNumber===newItem.partNumber);
        if(oldItem){
          const oldSPAPrice=oldItem.listPrice*(1-oldSPA.discount/100);
          const newSPAPrice=newItem.listPrice*(1-ns.discount/100);
          const diff=newSPAPrice-oldSPAPrice;
          const pct=oldSPAPrice>0?((diff/oldSPAPrice)*100):0;
          deltaItems.push({partNumber:newItem.partNumber,description:newItem.description,uom:newItem.uom||"EA",oldPrice:oldSPAPrice,newPrice:newSPAPrice,diff,pct});
        } else {
          deltaItems.push({partNumber:newItem.partNumber,description:newItem.description,uom:newItem.uom||"EA",oldPrice:null,newPrice:newItem.listPrice*(1-ns.discount/100),diff:null,pct:null,isNew:true});
        }
      });
      // Parts removed in renewal
      oldSPA.items.forEach(oldItem=>{

function getFileType(file) {
  const n=file.name.toLowerCase();
  if(n.endsWith(".pdf"))  return "pdf";
  if(n.endsWith(".xlsx")||n.endsWith(".xls")) return "excel";
  if(n.endsWith(".docx")||n.endsWith(".doc")) return "word";
  return null;
}

async function handleFile(file) {
  const ft=getFileType(file);
  if(!ft){S.imp.err="Unsupported file. Use PDF, Excel (.xlsx), or Word (.docx)";render();return;}
  S.imp={...S.imp,file,name:file.name,fileType:ft,err:"",step:"ready"};
  if(ft==="excel") {
    // For Excel, extract data client-side first then send to AI
    try {
      const ab=await file.arrayBuffer();
      const wb=XLSX.read(ab,{type:"arraybuffer"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const csv=XLSX.utils.sheet_to_csv(ws);
      S.imp.csvText=csv;
    } catch(e){S.imp.err="Could not read Excel file.";render();return;}
  }
  // Convert to base64 for PDF/Word
  const reader=new FileReader();
  reader.onload=()=>{S.imp.b64=reader.result.split(",")[1];render();};
  reader.onerror=()=>{S.imp.err="Could not read file.";render();};
  reader.readAsDataURL(file);
}

async function doExtract() {
  if(!S.apiKey){alert("Please set your Anthropic API key first.");return;}
  S.imp.busy=true;S.imp.step="extracting";render();

  const prompt=`You are parsing a Special Pricing Agreement (SPA) or price quote document. Extract all data and return ONLY a valid JSON object (no markdown, no explanation):
{
  "vendor": "manufacturer name",
  "endUser": "end-user customer name",
  "spaNumber": "SPA or quote reference number",
  "discount": 0,
  "expiration": "YYYY-MM-DD",
  "category": "Cabling|Fiber|Enclosures|Racks|Connectivity|Infrastructure|Other",
  "items": [{"partNumber":"","description":"","listPrice":0.00,"qty":1,"uom":"FT"}]
}

CRITICAL PRICING RULES — read carefully:
- If the document only shows ONE price per item (no separate list price), set listPrice to 0. Only set listPrice if there is a clearly separate list/standard/retail price shown alongside the SPA price.
- listPrice must ALWAYS be the price per single unit (per 1 FT, per 1 EA, etc.)
- If pricing is shown as per 1000 FT (e.g. "262.00/1000 FT" or "0.6316 per 1000 FT" or price column says "PRICE PER UOM" with UOM=1000): divide by 1000 to get per-FT price. Example: 262.00/1000FT = 0.262/FT
- If pricing is shown as "/MF" or "per MF" or "per M feet": divide by 1000. Example: $504.00/MF = $0.504/FT
- If the document has columns like "ORD QTY UOM" showing 1000 and "PRICE PER UOM": the price shown is per 1000 units — divide by 1000
- uom should always be the base unit: use FT (not MF or /1000FT), EA, PK, BOX, ROLL, PR, CTN
- qty is the total quantity ordered (e.g. 100000 FT, 50000 FT)
- discount: if individual item prices are already the SPA prices (no separate list price shown), set discount to 0
- expiration: use the Agreement End Date or expiration date. Format YYYY-MM-DD
- Use 0 for missing numbers, "" for missing strings. items=[] if none found.`;

  try {
    let messageContent;
    if(S.imp.fileType==="pdf"){
      messageContent=[
        {type:"document",source:{type:"base64",media_type:"application/pdf",data:S.imp.b64}},
        {type:"text",text:prompt}
      ];
    } else if(S.imp.fileType==="excel"){
      messageContent=[{type:"text",text:prompt+"\n\nHere is the spreadsheet data in CSV format:\n\n"+S.imp.csvText}];
    } else {
      try {
        // Use mammoth.js for proper Word doc text extraction
        const arrayBuf=Uint8Array.from(atob(S.imp.b64),c=>c.charCodeAt(0)).buffer;
        const mammothResult=await mammoth.extractRawText({arrayBuffer:arrayBuf});
        const docText=mammothResult.value.trim()||"[Could not extract text from Word document]";
        messageContent=[{type:"text",text:prompt+"\n\nWord document text content:\n\n"+docText}];
      } catch(we) {
        // Fallback: manual XML extraction
        try {
          const bytes=new Uint8Array(Uint8Array.from(atob(S.imp.b64),c=>c.charCodeAt(0)).buffer);
          const raw=new TextDecoder("utf-8",{fatal:false}).decode(bytes);
          const matches=raw.match(/<w:t[^>]*>([^<]+)<\/w:t>/g)||[];
          const docText=matches.map(m=>m.replace(/<[^>]+>/g,"")).join(" ").trim()||"[Could not extract text]";
          messageContent=[{type:"text",text:prompt+"\n\nWord document text content:\n\n"+docText}];
        } catch(we2) {
          messageContent=[{type:"text",text:prompt+"\n\nWord document could not be read. Return empty JSON."}];
        }
      }
    }

    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":S.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-opus-4-5",max_tokens:16000,messages:[{role:"user",content:messageContent}]})
    });
    if(!resp.ok){const e=await resp.json();throw new Error(e.error?.message||"API error "+resp.status);}
    const data=await resp.json();
    let raw=data.content.map(c=>c.text||"").join("").trim().replace(/^```json\s*/,"").replace(/^```\s*/,"").replace(/\s*```$/,"").trim();
    // Attempt to repair truncated JSON from large PDFs
    let ex;
    try {
      ex=JSON.parse(raw);
    } catch(parseErr) {
      // Try to repair: close open arrays and objects
      try {
        let fixed=raw;
        // Remove trailing incomplete item (last comma or partial object)
        fixed=fixed.replace(/,\s*\{[^}]*$/,"");
        fixed=fixed.replace(/,\s*"[^"]*":\s*[^,}\]]*$/,"");
        // Count unclosed brackets and close them
        const opens=(fixed.match(/\[/g)||[]).length-(fixed.match(/\]/g)||[]).length;
        const openb=(fixed.match(/\{/g)||[]).length-(fixed.match(/\}/g)||[]).length;
        for(let i=0;i<opens;i++) fixed+="]";
        for(let i=0;i<openb;i++) fixed+="}";
        ex=JSON.parse(fixed);
        toast("⚠ Large document — partial extraction saved. Review carefully.","ok",6000);
      } catch(e2) {
        throw new Error("Could not parse AI response. Document may be too large or complex. Try splitting into smaller sections.");
      }
    }
    // Try to match extracted endUser to existing accounts, otherwise leave blank for manual selection
    const extractedEU = ex.endUser||"";
    const allEUNames = Object.keys(S.margins);
    const matchedEU = allEUNames.find(n=>n.toLowerCase()===extractedEU.toLowerCase()) || "";
    S.imp.review={vendor:normalizeVendor(ex.vendor)||"",endUser:matchedEU,spaNumber:ex.spaNumber||"",discount:String(ex.discount||""),expiration:ex.expiration||"",category:ex.category||"",items:(ex.items||[]).map(i=>({partNumber:i.partNumber||"",description:i.description||"",listPrice:parseFloat(i.listPrice)||0,listUnknown:!parseFloat(i.listPrice),qty:parseInt(i.qty)||1,uom:i.uom||"EA"})),_ni:blankItem(),_extractedEU:extractedEU};
    S.imp.step="review";S.imp.busy=false;
  } catch(e){
    S.imp.step="upload";S.imp.busy=false;S.imp.err="Extraction failed: "+e.message;
  }
  render();
}

async function uploadDocToSupabase(file, spaId) {
  // Upload PDF to Supabase Storage via signed URL approach
  // Uses the REST API directly
  const SUPA_URL = document.querySelector('meta[name="supa-url"]')?.content || "";
  const SUPA_KEY = document.querySelector('meta[name="supa-key"]')?.content || "";
  if(!SUPA_URL||!SUPA_KEY) return null;
  try {
    const path = "spa-docs/"+spaId+"-"+Date.now()+".pdf";
    const resp = await fetch(SUPA_URL+"/storage/v1/object/spa-documents/"+path, {
      method:"POST",
      headers:{"Authorization":"Bearer "+SUPA_KEY,"Content-Type":file.type||"application/pdf","x-upsert":"true"},
      body: file
    });
    if(!resp.ok) return null;
    return SUPA_URL+"/storage/v1/object/public/spa-documents/"+path;
  } catch(e) { return null; }
}

function getSummary(src){
  let tL=0,tS=0,tC=0;
  src.filter(s=>s.status!=="expired").forEach(spa=>{
    const m=S.margins[spa.endUser]??15;

  });
  return{tList:tL,tSPA:tS,tContract:tC,tGP:tC-tS};
}

function h(tag,attrs={},...kids){
  const el=document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k==="style"&&typeof v==="object") Object.assign(el.style,v);
    else if(k==="class") el.className=v;
    else if(k==="html")  el.innerHTML=v;
    else if(k.startsWith("on")&&typeof v==="function") el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  for(const c of kids){ if(c==null||c===false)continue; el.appendChild(typeof c==="string"?document.createTextNode(c):c); }
  return el;
}
const tx=(s,st={})=>{const e=document.createElement("span");e.textContent=s;Object.assign(e.style,st);return e;};
const badge=(l,c,bg)=>h("span",{class:"badge",style:{color:c,background:bg,borderColor:c+"33"}},l);
const pill=(l,c)=>h("span",{class:"pill",style:{color:c,background:c+"18",borderColor:c+"30"}},l);
const dot=(c,s=6)=>h("span",{class:"dot",style:{background:c,width:s+"px",height:s+"px"}});
const lbl=(t)=>h("div",{class:"stat-label mb4"},t);
const mkInp=(o,v,cb)=>{const e=h("input",{class:"inp",...o,value:v||""});e.addEventListener("input",ev=>cb(ev.target.value));return e;};
const mkSel=(choices,v,cb)=>{const e=h("select",{class:"inp"});choices.forEach(([val,lbl])=>{const o=h("option",{value:val},lbl);if(val===v)o.selected=true;e.appendChild(o);});e.addEventListener("change",ev=>cb(ev.target.value));return e;};
const btn=(l,c,fn,dis=false)=>{const e=h("button",{class:"btn "+c,onclick:fn},l);if(dis)e.disabled=true;return e;};
const labeled=(l,el)=>h("div",{class:"flex-col gap4"},h("div",{class:"stat-label mb4"},l),el);

      pr.appendChild(tx("Disc: "+spa.discount+"%",{color:"#4f8ef7",fontWeight:"600"}));
      pr.appendChild(tx("SPA: "+fmtSPA(item.listPrice*(1-spa.discount/100))+"/"+(item.uom||"EA"),{color:"#4ade80"}));
      pr.appendChild(tx("Total: "+fmtMoney(item.listPrice*(1-spa.discount/100)*item.qty),{color:"#dde3f0",fontWeight:"600"}));
      irow.appendChild(pr);
      card.appendChild(irow);

    if(matched.length<spa.items.length){

    card.appendChild(viewBtn);
    wrap.appendChild(card);
  });

  return wrap;
}

  left.appendChild(tb);

  // Vendor tab bar — counts always show total for that vendor (ignores status filter)

  allSrc.filter(s=>S.filterSt==="all"||s.status===S.filterSt).forEach(s=>{vCountsFiltered[s.vendor]=(vCountsFiltered[s.vendor]||0)+1;});

    vList.forEach(([v,totalCnt])=>{

      const clrBtn=h("button",{style:{background:"transparent",border:"1px solid #2a3a52",borderRadius:"4px",padding:"2px 8px",fontSize:"11px",color:"#64748b",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}},"✕ Clear filter");

    const row=h("div",{class:"tbl-row"+(isSel?" sel":"")+(S.compactView?" compact":""),style:{gridTemplateColumns:cols}});
    row.addEventListener("click",()=>set({selSPA:isSel?null:spa}));
    const vc=h("div");
    vc.appendChild(tx(spa.vendor,{fontWeight:"700",fontSize:"14px",display:"block",color:"#f1f5f9"}));
    vc.appendChild(tx(spa.spaNumber,{fontSize:"12px",color:"#64748b",display:"block",marginTop:"3px"}));
    row.appendChild(vc);
    if(S.activeEU==="all")row.appendChild(h("div",{},pill(spa.endUser,euCol(spa.endUser,allEUs))));
    row.appendChild(tx(spa.category,{fontSize:"12px",color:"#94a3b8"}));
    row.appendChild(h("span",{class:"syne",style:{fontSize:"13px",fontWeight:"700",color:"#4f8ef7"}},spa.discount+"%"));
    const dc=h("div");
    dc.appendChild(tx(fmtDate(spa.expiration),{fontSize:"12px",display:"block",color:"#dde3f0"}));
    dc.appendChild(tx(days<0?Math.abs(days)+"d ago":days===0?"Today":days+"d left",{fontSize:"11px",color:days<0?"#f87171":days===0?"#fb923c":days<=EXPIRING_DAYS?"#fbbf24":"#94a3b8",display:"block",marginTop:"2px",fontWeight:"500"}));
    row.appendChild(dc);
    // Status badge + renewal requested button
    const statusCell=h("div",{style:{display:"flex",flexDirection:"column",gap:"4px"}});
    statusCell.appendChild(badge(spa.renewalStatus&&ST[spa.renewalStatus]?ST[spa.renewalStatus].label:s.label,spa.renewalStatus&&ST[spa.renewalStatus]?ST[spa.renewalStatus].color:s.color,spa.renewalStatus&&ST[spa.renewalStatus]?ST[spa.renewalStatus].bg:s.bg));

    if(spa.status==="expired"||spa.status==="expiring"||spa.status==="today"){

      rBtn.addEventListener("click",e=>{e.stopPropagation();S._replacingSPA=spa;S.imp={step:"upload",file:null,b64:null,name:"",fileType:"",busy:false,err:"",review:null};set({showImport:true});});
      aCell.appendChild(rBtn);
    }
    const db=h("button",{class:"btn btn-ghost btn-sm tip","data-tip":"Delete this SPA permanently"},"✕");
    db.style.cssText="padding:3px 8px;font-size:11px;";
    db.addEventListener("click",e=>{e.stopPropagation();S._deletingId=spa.id;S._deletingName=spa.vendor+" · "+spa.spaNumber;set({showDeleteConfirm:true});});
    aCell.appendChild(db);
    row.appendChild(aCell);
    tw.appendChild(row);
  });
  left.appendChild(tw);wrap.appendChild(left);

  if(S.selSPA){
    const spa=S.selSPA,m=S.margins[spa.endUser]??15;
    const lt=spa.items.reduce((s,i)=>s+i.listPrice*i.qty,0);
    const sc=spa.items.reduce((s,i)=>s+i.listPrice*(1-spa.discount/100)*i.qty,0),ct=sc*(1+m/100);
    const color=euCol(spa.endUser,allEUs),st=ST[spa.status];
    const panel=h("div",{class:"card fadein sticky-top",style:{padding:"16px",height:"fit-content"}});
    const ph=h("div",{class:"flex mb10",style:{justifyContent:"space-between",alignItems:"start"}});
    const pt=h("div");
    pt.appendChild(tx(spa.vendor,{fontFamily:"'Syne',sans-serif",fontSize:"15px",fontWeight:"700",display:"block"}));
    pt.appendChild(tx(spa.spaNumber,{fontSize:"12px",color:"#8ba9d4",display:"block",marginTop:"3px"}));
    ph.appendChild(pt);
    const cr=h("div",{class:"flex gap6"});
    cr.appendChild(btn("Edit","btn btn-muted",()=>set({showEdit:true,editSPA:{...spa,_ni:blankItem()}})));
    cr.appendChild(btn("✕","btn btn-ghost",()=>set({selSPA:null})));
    ph.appendChild(cr);panel.appendChild(ph);
    panel.appendChild(h("div",{class:"mb10"},pill(spa.endUser,color)));
    const meta=h("div",{class:"g2 mb10"});
    const statusLabel=(spa.renewalStatus&&ST[spa.renewalStatus]?ST[spa.renewalStatus].label:st.label)+(spa.renewalRequested?" · 📬 Renewal Requested":"");
    [[spa.discount+"%","Discount","#4f8ef7"],[spa.category,"Category","#8ba9d4"],[fmtDate(spa.expiration),"Expires",st.color],[statusLabel,"Status",spa.renewalStatus&&ST[spa.renewalStatus]?ST[spa.renewalStatus].color:st.color]].forEach(([val,lb,c])=>{
      const mc=h("div",{class:"subcard",style:{padding:"8px 10px"}});
      mc.appendChild(h("div",{class:"stat-label mb4"},lb));
      mc.appendChild(tx(val,{fontSize:"12px",fontWeight:"600",color:c}));
      meta.appendChild(mc);
    });
    panel.appendChild(meta);
    // Document attachment section
    const docRow=h("div",{class:"flex gap6 mb10",style:{alignItems:"center"}});
    if(spa.docUrl){
      const viewBtn=btn("📄 View Original Document","btn btn-muted",()=>{
        // Show PDF in embedded modal viewer
        const bd=h("div",{class:"pdf-viewer-backdrop"});
        const hd=h("div",{class:"pdf-viewer-header"});
        hd.appendChild(h("div",{class:"syne",style:{fontSize:"14px",fontWeight:"700",color:"#dde3f0",flex:"1"}},spa.vendor+" · "+spa.spaNumber));
        const dlBtn=h("a",{href:spa.docUrl,download:spa.vendor+"-"+spa.spaNumber+".pdf",class:"btn btn-muted",style:{textDecoration:"none",fontSize:"11px"}},"⬇ Download");
        hd.appendChild(dlBtn);
        hd.appendChild(btn("✕ Close","btn btn-ghost",()=>bd.remove()));
        bd.appendChild(hd);
        const frame=h("iframe",{class:"pdf-viewer-frame",src:spa.docUrl});
        frame.style.height="calc(100vh - 100px)";
        bd.appendChild(frame);
        bd.addEventListener("click",e=>{if(e.target===bd)bd.remove();});
        document.body.appendChild(bd);
      });
      viewBtn.style.fontSize="11px";
      docRow.appendChild(viewBtn);
    }
    const uploadLabel=h("label",{class:"btn btn-ghost",style:{fontSize:"11px",cursor:"pointer"}},spa.docUrl?"↑ Replace Doc":"📎 Attach PDF");
    const uploadInput=h("input",{type:"file",accept:".pdf",style:{display:"none"}});
    uploadInput.addEventListener("change",async e=>{
      const f=e.target.files[0];if(!f)return;
      toast("Uploading document...");
      const reader=new FileReader();
      reader.onload=async()=>{
        // Store as data URL for now (Option 3 upgrade: use Supabase Storage)
        const dataUrl=reader.result;
        try{
          await apiPut("/api/spas",{id:spa.id,vendor:spa.vendor,end_user:spa.endUser,spa_number:spa.spaNumber,discount:spa.discount,expiration:spa.expiration,category:spa.category,items:spa.items,doc_url:dataUrl,renewal_status:spa.renewalStatus||null,renewal_requested:spa.renewalRequested||false});
          const updatedSPA={...spa,docUrl:dataUrl};
          S.spas=S.spas.map(s=>s.id===spa.id?updatedSPA:s);
          S.selSPA=updatedSPA;
          toast("Document attached ✓");
          render();
        }catch(err){toast("Upload failed: "+err.message,"err");}
      };
      reader.readAsDataURL(f);
    });
    uploadLabel.appendChild(uploadInput);
    docRow.appendChild(uploadLabel);
    panel.appendChild(docRow);
    panel.appendChild(h("div",{class:"stat-label mb6"},"Line Items"));
    spa.items.forEach(item=>{
      const uom=item.uom||"EA";

      const totalSPA=spaUnit*item.qty;
      const ic=h("div",{class:"subcard mb5",style:{padding:"8px 10px"}});
      ic.appendChild(tx(item.partNumber,{fontSize:"10px",color:"#8ba9d4",fontWeight:"600",display:"block"}));
      ic.appendChild(tx(item.description,{fontSize:"10px",color:"#4a5568",display:"block",marginTop:"1px",marginBottom:"5px"}));
      const pr=h("div",{class:"flex gap8",style:{fontSize:"10px",flexWrap:"wrap"}});
      pr.appendChild(tx("List: "+(item.listUnknown?"N/A":fmtMoney(item.listPrice)+"/"+uom),{color:"#4a5568"}));
      pr.appendChild(tx("Qty: "+item.qty+" "+uom,{color:"#4a5568"}));
      pr.appendChild(tx("SPA: "+fmtSPA(spaUnit)+"/"+uom,{color:"#4ade80"}));
      pr.appendChild(tx("Total: "+fmtMoney(spaUnit*item.qty),{color:"#8ba9d4"}));
      ic.appendChild(pr);panel.appendChild(ic);
    });
    const tot=h("div",{class:"subcard",style:{padding:"10px 12px",marginTop:"4px"}});
    [["Total List",fmtMoney(lt),"#8ba9d4"],[`SPA Cost (${spa.discount}% off)`,fmtMoney(sc),"#4ade80"]].forEach(([l,v,c])=>{
      const r=h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"11px",marginBottom:"4px"}});
      r.appendChild(tx(l,{color:"#4a5568"}));r.appendChild(tx(v,{color:c}));tot.appendChild(r);
    });
    const br=h("div",{style:{borderTop:"1px solid #131b28",marginTop:"7px",paddingTop:"7px",display:"flex",justifyContent:"space-between",fontSize:"12px",fontWeight:"600"}});
    br.appendChild(tx(`Contract (${m}% margin)`));br.appendChild(tx(fmtMoney(ct),{color}));
    tot.appendChild(br);panel.appendChild(tot);
    wrap.appendChild(panel);
  }
  return wrap;
}



// ═══════════════════════════════════════════
//  COST IMPACT / SPA HISTORY
// ═══════════════════════════════════════════
function renderHistory(){
  const wrap=h("div",{class:"fadein",id:"main",style:{padding:"20px 24px",maxWidth:"1100px"}});

  // Header
  const hdg=h("div",{class:"flex gap10 mb16",style:{alignItems:"center",flexWrap:"wrap"}});
  hdg.appendChild(h("h2",{class:"syne",style:{fontSize:"19px",fontWeight:"700",color:"#f1f5f9",flex:"1"}},"Price Intel"));
  hdg.appendChild(h("div",{style:{fontSize:"12px",color:"#4a5568"}},"Renewal price changes · Last 2 years"));
  wrap.appendChild(hdg);

  if(!S.historyLoaded){
    const loading=h("div",{style:{textAlign:"center",padding:"40px",color:"#4a5568"}});
    loading.appendChild(h("div",{class:"spin",style:{width:"24px",height:"24px",margin:"0 auto 12px"}}));
    loading.appendChild(tx("Loading history...",{display:"block"}));
    wrap.appendChild(loading);
    return wrap;
  }

  if(!S.history.length){
    const empty=h("div",{style:{textAlign:"center",padding:"60px 20px"}});
    empty.appendChild(h("div",{style:{fontSize:"32px",marginBottom:"12px"}},"📊"));
    empty.appendChild(h("div",{class:"syne",style:{fontSize:"16px",color:"#4a5568",marginBottom:"8px"}},"No renewal history yet"));
    empty.appendChild(tx("When you renew an expired SPA the price comparison will be saved here.",{fontSize:"13px",color:"#2a3a52",display:"block"}));
    wrap.appendChild(empty);
    return wrap;
  }

  // Group by end_user A-Z
  const grouped={};
  S.history.forEach(rec=>{
    if(!grouped[rec.end_user]) grouped[rec.end_user]=[];
    grouped[rec.end_user].push(rec);
  });

  Object.keys(grouped).sort((a,b)=>a.localeCompare(b)).forEach(eu=>{
    wrap.appendChild(h("div",{class:"eu-group-hdr"},eu));
    grouped[eu].forEach((rec,idx)=>{
      const items=rec.delta_items||[];
      const priced=items.filter(i=>i.diff!==null&&!i.isNew&&!i.isRemoved);
      const avgPct=priced.length>0?(priced.reduce((s,i)=>s+i.pct,0)/priced.length):0;
      const increased=items.filter(i=>i.diff>0).length;
      const decreased=items.filter(i=>i.diff<0).length;
      const newParts=items.filter(i=>i.isNew).length;
      const removed=items.filter(i=>i.isRemoved).length;
      const avgColor=avgPct>0?"#f87171":avgPct<0?"#4ade80":"#64748b";

      const card=h("div",{class:"hist-card"});
      const cardHdr=h("div",{class:"hist-card-hdr"});
      // Vendor + SPA numbers
      const vInfo=h("div");
      vInfo.appendChild(h("div",{style:{fontSize:"13px",fontWeight:"700",color:"#f1f5f9"}},rec.vendor));
      vInfo.appendChild(h("div",{style:{fontSize:"11px",color:"#4a5568",marginTop:"2px"}},(rec.old_spa_number||"—")+" → "+(rec.new_spa_number||"—")));
      cardHdr.appendChild(vInfo);
      // Renewed date
      cardHdr.appendChild(h("div",{style:{fontSize:"12px",color:"#64748b",textAlign:"center"}},new Date(rec.renewed_at).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})));
      // Change badges
      const badges=h("div",{style:{display:"flex",gap:"4px",flexWrap:"wrap",justifyContent:"center"}});
      if(increased>0) badges.appendChild(h("span",{style:{background:"rgba(248,113,113,.15)",color:"#f87171",borderRadius:"3px",padding:"1px 5px",fontSize:"10px",fontWeight:"600"}},increased+" ↑"));
      if(decreased>0) badges.appendChild(h("span",{style:{background:"rgba(74,222,128,.15)",color:"#4ade80",borderRadius:"3px",padding:"1px 5px",fontSize:"10px",fontWeight:"600"}},decreased+" ↓"));
      if(newParts>0)  badges.appendChild(h("span",{style:{background:"rgba(79,142,247,.15)",color:"#4f8ef7",borderRadius:"3px",padding:"1px 5px",fontSize:"10px",fontWeight:"600"}},newParts+" NEW"));
      if(removed>0)   badges.appendChild(h("span",{style:{background:"rgba(248,113,113,.1)",color:"#f87171",borderRadius:"3px",padding:"1px 5px",fontSize:"10px",fontWeight:"600"}},removed+" REM"));
      cardHdr.appendChild(badges);
      // Avg % change
      cardHdr.appendChild(h("div",{class:"syne",style:{fontSize:"14px",fontWeight:"700",color:avgColor,textAlign:"right"}},(avgPct>=0?"+":"")+avgPct.toFixed(1)+"%"));
      // Expand arrow
      const arrow=h("div",{style:{fontSize:"12px",color:"#2a3a52",textAlign:"center"}},"▾");
      cardHdr.appendChild(arrow);

      // Body — expandable delta table
      const cardBody=h("div",{class:"hist-card-body"});
      // Discount change note
      if(rec.old_discount!==rec.new_discount){
        cardBody.appendChild(h("div",{style:{background:"rgba(251,191,36,.08)",border:"1px solid rgba(251,191,36,.2)",borderRadius:"5px",padding:"6px 10px",fontSize:"11px",color:"#fbbf24",marginBottom:"8px"}},"⚠ Discount changed: "+rec.old_discount+"% → "+rec.new_discount+"%"));
      }
      const dHdr=h("div",{class:"hist-delta-hdr"});
      ["Part #","Description","Old SPA","New SPA","Change","% Chg"].forEach(c=>dHdr.appendChild(h("div",{},c)));
      cardBody.appendChild(dHdr);
      items.forEach(item=>{
        const row=h("div",{class:"hist-delta-row",style:{background:item.isNew?"rgba(79,142,247,.06)":item.isRemoved?"rgba(248,113,113,.06)":item.diff>0?"rgba(248,113,113,.04)":item.diff<0?"rgba(74,222,128,.04)":"transparent"}});
        row.appendChild(tx(item.partNumber,{fontSize:"11px",color:"#8ba9d4",fontWeight:"600"}));
        row.appendChild(tx(item.description,{fontSize:"11px",color:"#64748b"}));
        if(item.isNew){
          row.appendChild(tx("—",{color:"#2a3a52"}));
          row.appendChild(tx(fmtSPA(item.newPrice)+"/"+(item.uom||"EA"),{color:"#4f8ef7",fontWeight:"600"}));
          row.appendChild(h("span",{style:{background:"#1e3a5f",color:"#4f8ef7",borderRadius:"3px",padding:"1px 6px",fontSize:"10px",fontWeight:"600"}},"NEW"));
          row.appendChild(tx("—",{color:"#2a3a52"}));
        } else if(item.isRemoved){
          row.appendChild(tx(fmtSPA(item.oldPrice)+"/"+(item.uom||"EA"),{color:"#4a5568"}));
          row.appendChild(tx("—",{color:"#2a3a52"}));
          row.appendChild(h("span",{style:{background:"#2d0a0a",color:"#f87171",borderRadius:"3px",padding:"1px 6px",fontSize:"10px",fontWeight:"600"}},"REMOVED"));
          row.appendChild(tx("—",{color:"#2a3a52"}));
        } else {
          const dc=item.diff>0?"#f87171":item.diff<0?"#4ade80":"#64748b";
          row.appendChild(tx(fmtSPA(item.oldPrice)+"/"+(item.uom||"EA"),{color:"#8ba9d4"}));
          row.appendChild(tx(fmtSPA(item.newPrice)+"/"+(item.uom||"EA"),{color:dc,fontWeight:"600"}));
          row.appendChild(tx((item.diff>=0?"+":"")+fmtSPA(item.diff)+"/"+(item.uom||"EA"),{color:dc,fontWeight:"600"}));
          row.appendChild(tx((item.pct>=0?"+":"")+item.pct.toFixed(1)+"%",{color:dc,fontWeight:"700"}));
        }
        cardBody.appendChild(row);
      });
      card.appendChild(cardHdr);
      card.appendChild(cardBody);

      // Toggle expand/collapse
      cardHdr.addEventListener("click",()=>{
        const isOpen=cardBody.classList.contains("open");
        cardBody.classList.toggle("open",!isOpen);
        arrow.textContent=isOpen?"▾":"▴";
      });
      wrap.appendChild(card);
    });
  });
  return wrap;
}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  const allEUs=buildEUs(S.spas,S.margins);
  const alerts=S.spas.filter(s=>s.status==="expiring"||s.status==="expired");
  const searchActive=!!S.searchQ.trim();

  if(S.loading){
    const ls=h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:"14px"}});
    ls.appendChild(h("div",{class:"spin",style:{width:"28px",height:"28px",borderWidth:"3px"}}));
    ls.appendChild(tx("Loading SPAs...",{fontSize:"13px",color:"#4a5568"}));
    app.appendChild(ls);return;
  }
  if(S.loadErr){
    const es=h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:"8px"}});
    es.appendChild(tx("⚠ Could not connect to database",{fontSize:"15px",color:"#f87171",display:"block"}));
    es.appendChild(tx(S.loadErr,{fontSize:"11px",color:"#4a5568",display:"block"}));
    app.appendChild(es);return;
  }

  // ── NAV ──
  const nav=h("div",{id:"topnav"});
  nav.appendChild(h("div",{class:"logo"},"SPA",h("span",{},"track")));
  nav.appendChild(h("div",{class:"nav-divider"}));
  [["dashboard","Overview"],["spas","SPA Library"],["history","Price Intel"]].forEach(([v,l])=>{
    const ni=h("div",{class:"navitem"+(S.view===v&&!searchActive?" active":"")},l);
    ni.addEventListener("click",()=>set({view:v,searchQ:"",selSPA:v!==S.view?null:S.selSPA}));
    nav.appendChild(ni);
  });
  const nr=h("div",{class:"nav-right"});
  if(alerts.length>0) nr.appendChild(h("div",{class:"alert-pill"},"⚠ "+alerts.length+" ALERT"+(alerts.length>1?"S":"")));
  nr.appendChild(btn("✦ Import File","btn btn-ai",()=>{if(!S.apiKey){set({showApiKey:true});return;}S.imp={step:"upload",file:null,b64:null,name:"",fileType:"",busy:false,err:"",review:null};set({showImport:true});}));
  nr.appendChild(btn("⚙","btn btn-ghost",()=>set({showApiKey:true})));
  nr.appendChild(btn("+ Add SPA","btn btn-primary",()=>set({showAdd:true,newSPA:blankSPA()})));
  nav.appendChild(nr);
  app.appendChild(nav);

  // ── ACCOUNT BAR (dropdown) ──
  const accountBar=h("div",{id:"accountbar"});
  accountBar.appendChild(h("span",{class:"eu-label"},"Account"));

  // Dropdown select
  const selWrap=h("div",{class:"eu-select-wrap"});
  const euSel2=h("select",{class:"eu-select"});
  const allOpt=h("option",{value:"all"},"All Accounts ("+S.spas.length+")");
  if(S.activeEU==="all") allOpt.selected=true;
  euSel2.appendChild(allOpt);
  allEUs.forEach(eu=>{
    const count=S.spas.filter(s=>s.endUser===eu.name).length;
    const hasWarn=S.spas.some(s=>s.endUser===eu.name&&(s.status==="expiring"||s.status==="expired"));
    const opt=h("option",{value:eu.name},(hasWarn?"⚠ ":"")+eu.name+" ("+count+")");
    if(S.activeEU===eu.name) opt.selected=true;
    euSel2.appendChild(opt);
  });
  euSel2.addEventListener("change",e=>set({activeEU:e.target.value,selSPA:null,searchQ:"",activeVendor:"all",filterSt:"all"}));
  selWrap.appendChild(euSel2);
  selWrap.appendChild(h("span",{class:"eu-select-arrow"},"▾"));
  accountBar.appendChild(selWrap);

  // Color dot for selected account
  if(S.activeEU!=="all"){
    const selEU=allEUs.find(e=>e.name===S.activeEU);
    if(selEU){
      const d=h("span",{class:"eu-dot",style:{background:selEU.color,flexShrink:"0"}});
      selWrap.insertBefore(d,euSel2);
    }
  }

  // Add account button
  const addAccBtn=h("button",{class:"eu-add-btn"},"+  Add Account");
  addAccBtn.addEventListener("click",()=>set({showAddEU:true,newEU:""}));
  accountBar.appendChild(addAccBtn);

  // Edit / Delete buttons for selected account
  if(S.activeEU!=="all"){
    const actions=h("div",{class:"eu-actions"});
    const editAccBtn=h("button",{class:"eu-action-btn"},"✏ Rename");
    editAccBtn.addEventListener("click",()=>set({showEditEU:true,editEUOld:S.activeEU,editEUName:S.activeEU}));
    const delAccBtn=h("button",{class:"eu-action-btn danger"},"✕ Delete Account");
    delAccBtn.addEventListener("click",()=>set({showDeleteEU:true,deleteEUName:S.activeEU}));
    actions.appendChild(editAccBtn);actions.appendChild(delAccBtn);
    accountBar.appendChild(actions);
  }

  app.appendChild(accountBar);

  // ── SEARCH BAR ──
  const sb=h("div",{id:"searchbar"});
  const sw=h("div",{class:"search-wrap"});
  sw.appendChild(h("svg",{width:"14",height:"14",viewBox:"0 0 24 24",fill:"none",stroke:"currentColor","stroke-width":"2",html:'<circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>'}));
  const si=h("input",{class:"search-inp",type:"text",placeholder:"Search by part number or description...",value:S.searchQ});
  si.addEventListener("input",e=>{
    S.searchQ=e.target.value;
    const mainEl=document.getElementById("main");
    if(mainEl){
      const aEUs=buildEUs(S.spas,S.margins);
      mainEl.innerHTML="";
      if(S.searchQ.trim()) mainEl.appendChild(renderSearch());
      else if(S.view==="dashboard") mainEl.appendChild(renderDashboard(aEUs));
      else if(S.view==="spas")      mainEl.appendChild(renderSPAs(aEUs));
      else if(S.view==="history")   mainEl.appendChild(renderHistory());

    }
  });
  si.addEventListener("keydown",e=>{if(e.key==="Escape"){S.searchQ="";render();}});
  sw.appendChild(si);
  if(S.searchQ){
    const clr=h("button",{class:"search-clear",onclick:()=>set({searchQ:""})},"✕");
    sw.appendChild(clr);
  }
  sb.appendChild(sw);
  app.appendChild(sb);

  // ── MAIN ──
  const main=h("div",{id:"main"});
  if(searchActive)          main.appendChild(renderSearch());
  else if(S.view==="dashboard") main.appendChild(renderDashboard(allEUs));
  else if(S.view==="spas")      main.appendChild(renderSPAs(allEUs));
  else if(S.view==="history")   { loadHistory().then(()=>render()); main.appendChild(renderHistory()); }

  app.appendChild(main);

  // ── MODALS ──
  if(S.showImport)  app.appendChild(importModal());
  if(S.showApiKey)  app.appendChild(apiKeyModal());

  if(S.showAdd||S.showEdit){
    const spa=S.showEdit?S.editSPA:{...S.newSPA,_ni:blankItem()};
    const bd=h("div",{class:"modal-backdrop"});
    bd.addEventListener("click",e=>{if(e.target===bd)set({showAdd:false,showEdit:false,editSPA:null});});
    bd.appendChild(spaForm(spa,async(s)=>{S.showEdit?await doEditSPA():await doAddSPA(s);},()=>set({showAdd:false,showEdit:false,editSPA:null}),S.showEdit,false));
    app.appendChild(bd);
  }

  if(S.showAddEU){
    const bd=h("div",{class:"modal-backdrop"});
    bd.addEventListener("click",e=>{if(e.target===bd)set({showAddEU:false});});
    const box=h("div",{class:"modal-box sm fadein"});
    box.appendChild(h("div",{class:"syne mb4",style:{fontSize:"15px",fontWeight:"700"}},"Add End User Account"));
    box.appendChild(h("div",{class:"text-muted mb12",style:{fontSize:"11px"}},"Default margin of 15% applied. Adjust in Contract Builder."));
    box.appendChild(lbl("Account Name"));
    const ei=mkInp({type:"text",placeholder:"e.g. Raytheon",style:{marginBottom:"14px"}},S.newEU,v=>S.newEU=v);
    ei.addEventListener("keydown",e=>{if(e.key==="Enter"&&S.newEU.trim())doAddEU();});
    box.appendChild(ei);
    const br=h("div",{class:"flex gap8"});
    br.appendChild(btn("Cancel","btn btn-ghost",()=>set({showAddEU:false})));
    const ab=btn("Add Account","btn btn-primary",doAddEU);ab.style.flex="2";br.appendChild(ab);
    box.appendChild(br);bd.appendChild(box);app.appendChild(bd);
  }

  if(S.showClear){
    const bd=h("div",{class:"modal-backdrop"});
    const box=h("div",{class:"modal-box sm fadein"});
    box.appendChild(h("div",{class:"syne mb10",style:{fontSize:"15px",fontWeight:"700",color:"#f87171"}},"Clear All Data?"));
    box.appendChild(tx("This permanently deletes all SPAs from the database.",{fontSize:"12px",color:"#8ba9d4",display:"block",marginBottom:"16px"}));
    const br=h("div",{class:"flex gap8"});
    br.appendChild(btn("Cancel","btn btn-ghost",()=>set({showClear:false})));
    const cb=btn("Yes, Delete All","btn btn-danger",async()=>{
      try{await Promise.all(S.spas.map(s=>apiDel("/api/spas?id="+s.id)));S.spas=[];S.showClear=false;toast("All data cleared");}
      catch(e){toast("Error: "+e.message,"err");}
    });
    cb.style.flex="2";br.appendChild(cb);box.appendChild(br);bd.appendChild(box);app.appendChild(bd);
  }

  if(S.showEditEU){
    const bd=h("div",{class:"modal-backdrop"});
    bd.addEventListener("click",e=>{if(e.target===bd)set({showEditEU:false});});
    const box=h("div",{class:"modal-box sm fadein"});
    box.appendChild(h("div",{class:"syne mb4",style:{fontSize:"15px",fontWeight:"700"}},"Rename Account"));
    box.appendChild(lbl("New Account Name"));
    const ri=mkInp({type:"text",placeholder:"Enter new name",style:{marginBottom:"14px"}},S.editEUName,v=>S.editEUName=v);
    ri.addEventListener("keydown",e=>{if(e.key==="Enter")doRenameEU();});
    box.appendChild(ri);
    const br=h("div",{class:"flex gap8"});
    br.appendChild(btn("Cancel","btn btn-ghost",()=>set({showEditEU:false})));
    const rb=btn("Rename","btn btn-primary",doRenameEU);rb.style.flex="2";br.appendChild(rb);
    box.appendChild(br);bd.appendChild(box);app.appendChild(bd);
  }

  if(S.showDeleteEU){
    const bd=h("div",{class:"modal-backdrop"});
    const box=h("div",{class:"modal-box sm fadein"});
    box.appendChild(h("div",{class:"syne mb10",style:{fontSize:"15px",fontWeight:"700",color:"#f87171"}},"Delete Account?"));
    box.appendChild(tx("This will permanently delete "+S.deleteEUName+" and ALL of their SPAs from the database. This cannot be undone.",{fontSize:"12px",color:"#8ba9d4",display:"block",marginBottom:"16px"}));
    const br=h("div",{class:"flex gap8"});
    br.appendChild(btn("Cancel","btn btn-ghost",()=>set({showDeleteEU:false})));
    const db=btn("Yes, Delete Account","btn btn-danger",doDeleteEU);db.style.flex="2";br.appendChild(db);
    box.appendChild(br);bd.appendChild(box);app.appendChild(bd);
  }

  if(S.showDelta&&S.deltaData||S.showDelta&&S._deltaData){
    const d=S._deltaData;
    if(d){
      const bd=h("div",{class:"delta-modal"});
      const box=h("div",{class:"delta-box"});
      // Header
      const dh=h("div",{class:"delta-hdr"});
      dh.appendChild(h("div",{style:{flex:"1"}},
        h("div",{class:"syne",style:{fontSize:"16px",fontWeight:"800",color:"#f1f5f9"}},"Price Change Analysis"),
        h("div",{style:{fontSize:"12px",color:"#64748b",marginTop:"3px"}},d.vendor+" · "+d.endUser),
        h("div",{style:{fontSize:"11px",color:"#4a5568",marginTop:"2px"}},d.oldSPA+" → "+d.newSPA)
      ));
      const cls=btn("✕ Close","btn btn-ghost",()=>{S.showDelta=false;render();});
      dh.appendChild(cls);
      box.appendChild(dh);
      // Summary bar
      const increased=d.items.filter(i=>i.diff>0).length;
      const decreased=d.items.filter(i=>i.diff<0).length;
      const unchanged=d.items.filter(i=>i.diff===0).length;
      const allPriced=d.items.filter(i=>i.diff!==null&&!i.isNew&&!i.isRemoved);
      const avgPct=allPriced.length>0?(allPriced.reduce((s,i)=>s+i.pct,0)/allPriced.length):0;
      const sb=h("div",{style:{background:"#09111a",padding:"12px 20px",display:"flex",gap:"20px",flexWrap:"wrap",borderBottom:"1px solid #131b28",flexShrink:"0"}});
      [[increased+" increased","#f87171"],[decreased+" decreased","#4ade80"],[unchanged+" unchanged","#64748b"],["Avg change: "+(avgPct>=0?"+":"")+avgPct.toFixed(1)+"%",avgPct>0?"#f87171":avgPct<0?"#4ade80":"#64748b"]].forEach(([label,color])=>{
        sb.appendChild(h("div",{style:{fontSize:"12px",fontWeight:"600",color}},"● "+label));
      });
      if(d.newDiscount!==d.oldDiscount) sb.appendChild(h("div",{style:{fontSize:"12px",fontWeight:"600",color:"#fbbf24"}},"⚠ Discount changed: "+d.oldDiscount+"% → "+d.newDiscount+"%"));
      box.appendChild(sb);
      // Table
      const db=h("div",{class:"delta-body"});
      const hrow=h("div",{class:"delta-hdr-row"});
      ["Part #","Description","Old SPA","New SPA","Change","% Chg"].forEach(col=>hrow.appendChild(h("div",{},col)));
      db.appendChild(hrow);
      d.items.forEach(item=>{
        const row=h("div",{class:"delta-row",style:{background:item.isNew?"rgba(79,142,247,.06)":item.isRemoved?"rgba(248,113,113,.06)":item.diff>0?"rgba(248,113,113,.06)":item.diff<0?"rgba(74,222,128,.06)":"#09111a"}});
        row.appendChild(tx(item.partNumber,{fontSize:"11px",color:"#8ba9d4",fontWeight:"600"}));
        row.appendChild(tx(item.description,{fontSize:"11px",color:"#64748b"}));
        if(item.isNew){
          row.appendChild(tx("—",{color:"#4a5568"}));
          row.appendChild(tx(fmtSPA(item.newPrice)+"/"+item.uom,{color:"#4f8ef7"}));
          row.appendChild(h("span",{style:{background:"#1e3a5f",color:"#4f8ef7",borderRadius:"3px",padding:"1px 6px",fontSize:"10px",fontWeight:"600"}},"NEW"));
          row.appendChild(tx("—",{color:"#4a5568"}));
        } else if(item.isRemoved){
          row.appendChild(tx(fmtSPA(item.oldPrice)+"/"+item.uom,{color:"#4a5568"}));
          row.appendChild(tx("—",{color:"#4a5568"}));
          row.appendChild(h("span",{style:{background:"#2d0a0a",color:"#f87171",borderRadius:"3px",padding:"1px 6px",fontSize:"10px",fontWeight:"600"}},"REMOVED"));
          row.appendChild(tx("—",{color:"#4a5568"}));
        } else {
          const diffColor=item.diff>0?"#f87171":item.diff<0?"#4ade80":"#64748b";
          row.appendChild(tx(fmtSPA(item.oldPrice)+"/"+item.uom,{color:"#8ba9d4"}));
          row.appendChild(tx(fmtSPA(item.newPrice)+"/"+item.uom,{color:diffColor,fontWeight:"600"}));
          row.appendChild(tx((item.diff>=0?"+":"")+fmtSPA(item.diff)+"/"+item.uom,{color:diffColor,fontWeight:"600"}));
          row.appendChild(tx((item.pct>=0?"+":"")+item.pct.toFixed(1)+"%",{color:diffColor,fontWeight:"700"}));
        }
        db.appendChild(row);
      });
      box.appendChild(db);
      bd.appendChild(box);
      app.appendChild(bd);
    }
  }

  if(S.showDeleteConfirm){
    const bd=h("div",{class:"modal-backdrop"});
    const box=h("div",{class:"modal-box sm fadein"});
    box.appendChild(h("div",{class:"syne mb10",style:{fontSize:"15px",fontWeight:"700",color:"#f87171"}},"Delete SPA?"));
    box.appendChild(h("div",{style:{fontSize:"13px",color:"#94a3b8",marginBottom:"6px"}},S._deletingName));
    box.appendChild(h("div",{style:{fontSize:"12px",color:"#64748b",marginBottom:"18px"}},"This will permanently remove this SPA and all its line items. This cannot be undone."));
    const br=h("div",{class:"flex gap8"});
    br.appendChild(btn("Cancel","btn btn-ghost",()=>set({showDeleteConfirm:false,_deletingId:null,_deletingName:""})));
    const db2=btn("Yes, Delete SPA","btn",()=>{doDelete(S._deletingId);set({showDeleteConfirm:false,_deletingId:null,_deletingName:""},false);});
    db2.style.cssText="background:#7f1d1d;color:#fca5a5;flex:2";
    br.appendChild(db2);box.appendChild(br);bd.appendChild(box);app.appendChild(bd);
  }

  if(S.toast) app.appendChild(h("div",{class:"toast "+S.toast.type},S.toast.msg));
}

// ═══════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════
async function boot(){
  try{const d=await loadAll();S.spas=d.spas;S.margins=d.margins;S.loading=false;}
  catch(e){S.loading=false;S.loadErr=e.message;}
  render();
}
boot();
</script>
</body>
</html>
